      <stop offset="0%" stop-color="#1a4f8a"/>
      <stop offset="100%" stop-color="#3d7bb8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7cb342"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#sky)"/>
  <rect y="420" width="1200" height="180" fill="url(#ground)"/>
  <circle cx="950" cy="120" r="60" fill="#f5a623" opacity="0.9"/>
  <!-- School building -->
  <rect x="350" y="240" width="500" height="200" fill="#fff8e1"/>
  <polygon points="350,240 600,140 850,240" fill="#c62828"/>
  <rect x="560" y="320" width="80" height="120" fill="#1a4f8a"/>
  <rect x="400" y="290" width="60" height="60" fill="#90caf9" stroke="#1a4f8a" stroke-width="3"/>
  <rect x="500" y="290" width="60" height="60" fill="#90caf9" stroke="#1a4f8a" stroke-width="3"/>
  <rect x="640" y="290" width="60" height="60" fill="#90caf9" stroke="#1a4f8a" stroke-width="3"/>
  <rect x="740" y="290" width="60" height="60" fill="#90caf9" stroke="#1a4f8a" stroke-width="3"/>
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#fff">LONGFELLOW ELEMENTARY</text>
  <!-- Trees -->
  <circle cx="180" cy="430" r="60" fill="#2e7d32"/>
  <rect x="170" y="430" width="20" height="60" fill="#5d4037"/>
  <circle cx="1020" cy="430" r="60" fill="#2e7d32"/>
  <rect x="1010" y="430" width="20" height="60" fill="#5d4037"/>
</svg>
