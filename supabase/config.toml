# Supabase CLI project config for Schoolyard.
# Run `supabase start` from repo root to spin up a local stack for dev.
# See https://supabase.com/docs/guides/cli/config for the full reference.

project_id = "schoolyard"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:4321"
additional_redirect_urls = ["http://localhost:4321", "http://localhost:8081"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.apple]
enabled = false

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false
